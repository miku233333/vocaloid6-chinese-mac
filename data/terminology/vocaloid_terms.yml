translation_guidelines:
  zh_tw:
    - 使用台灣繁體中文用語
    - 避免中國大陸專用詞彙（如：软件→軟體，程序→程式）
    - 保持音樂製作專業術語準確
    - 簡潔明了，符合界面空間限制
    
  zh_cn:
    - 使用简体中文标准用语
    - 符合音乐制作行业标准
    - 保持术语一致性
    - 简洁清晰
